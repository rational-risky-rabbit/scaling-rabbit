<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Net Neutral News</title>
  <meta name="description" content="Understand the news without the bias. Compare coverage. Think critically.">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .recent-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 1.25rem;
    }
    .load-more-bar {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin: 2.5rem 0 1rem;
    }
    .load-more-bar .rule { flex: 1; height: 1px; background: var(--rule); }
    #load-more-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.5rem;
      border: 1.5px solid var(--rule);
      border-radius: var(--r-full);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-2);
      cursor: pointer;
      background: var(--paper-2);
      transition: all 0.2s;
      white-space: nowrap;
    }
    #load-more-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    #load-more-btn .arrow {
      display: inline-block;
      transition: transform 0.25s;
    }
    #load-more-btn.open .arrow { transform: rotate(180deg); }
    #older-stories { display: none; }
    #older-stories.visible { display: block; }
  </style>
</head>
<body>
  <div id="navbar-slot"></div>

  <div class="container">
    <div style="max-width:40rem; margin-bottom:4rem; padding-bottom:3rem; border-bottom:1px solid var(--rule);">
      <p class="eyebrow eyebrow-accent">Media Literacy Project</p>
      <h1 class="hero">One story.<br><span class="grad-text">Many versions.</span></h1>
      <p class="lede">
        We take a single news story and show you how different outlets cover it —
        then break down what each outlet's framing reveals about their editorial choices.
      </p>
    </div>

    <div id="stories-list">
      <p class="empty">Loading stories…</p>
    </div>
  </div>

  <div id="footer-slot"></div>

  <script src="/assets/js/site.js"></script>
  <script>
    renderSiteChrome('home');

    const RECENT_COUNT = 5;

    function storyCardHTML(s) {
      return `
        <a class="story-card" href="/news/?slug=${encodeURIComponent(s.slug)}">
          <div class="story-card-inner">
            <div style="flex:1;">
              <h2>${escapeHTML(s.title)}</h2>
              <p class="summary">${escapeHTML(s.summary)}</p>
              <div class="meta">
                <span>${formatDate(s.date)}</span>
                <span>·</span>
                <span>${(s.coverages || []).length} sources compared</span>
              </div>
            </div>
            <span class="source-count">${(s.coverages || []).length} sources →</span>
          </div>
        </a>`;
    }

    (async function () {
      const listEl = document.getElementById('stories-list');
      try {
        const slugs = await loadJSON('stories/index.json');
        if (!slugs.length) { listEl.innerHTML = '<p class="empty">No stories yet.</p>'; return; }

        const results = await Promise.allSettled(
          slugs.map(s => loadJSON('stories/' + s + '.json'))
        );
        const stories = results
          .map((r, i) => {
            if (r.status === 'rejected') { console.warn('Failed:', slugs[i], r.reason); return null; }
            return r.value;
          })
          .filter(Boolean);

        if (!stories.length) { listEl.innerHTML = '<p class="empty">No stories could be loaded.</p>'; return; }

        stories.sort((a, b) => new Date(b.date) - new Date(a.date));

        const recent = stories.slice(0, RECENT_COUNT);
        const older  = stories.slice(RECENT_COUNT);

        let html = `<p class="recent-label">Latest stories</p>`;
        html += recent.map(storyCardHTML).join('');

        if (older.length) {
          html += `
            <div class="load-more-bar">
              <div class="rule"></div>
              <button id="load-more-btn">
                <span>${older.length} older stories</span>
                <span class="arrow">↓</span>
              </button>
              <div class="rule"></div>
            </div>
            <div id="older-stories">
              ${older.map(storyCardHTML).join('')}
            </div>`;
        }

        listEl.innerHTML = html;

        const btn   = document.getElementById('load-more-btn');
        const panel = document.getElementById('older-stories');
        if (btn && panel) {
          btn.addEventListener('click', () => {
            const isOpen = panel.classList.toggle('visible');
            btn.classList.toggle('open', isOpen);
            btn.querySelector('span').textContent = isOpen
              ? 'Show fewer stories'
              : `${older.length} older stories`;
          });
        }

      } catch(err) {
        console.error('Loader error:', err);
        listEl.innerHTML = '<p class="empty">Error: ' + escapeHTML(err.message) + '</p>';
      }
    })();
  </script>
</body>
</html>
